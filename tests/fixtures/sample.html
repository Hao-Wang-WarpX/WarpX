      <p>Python 是一门流行的编程语言。本指南介绍基础语法。</p>

      <h2>变量</h2>
      <p>变量用于存储数据。例如 <code>x = 10</code>。</p>

      <h2>函数</h2>
      <p>用 <code>def</code> 关键字定义函数。详见 <a href="https://docs.python.org/3/tutorial/controlflow.html#defining-functions">官方文档</a>。</p>

      <pre><code>def hello():
    print("hi")</code></pre>

      <h2>列表</h2>
      <p>列表用方括号 <code>[]</code> 表示。</p>
